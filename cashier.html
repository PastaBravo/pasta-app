<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cashier POS</title>

<style>
:root{
--primary:#b52627;
--cream:#f3e9cb;
--dark:#231a1d;
--success:#2e7d32;
}

body{margin:0;font-family:-apple-system;background:var(--cream);}

.header{
background:var(--primary);
color:#fff;
padding:14px;
text-align:center;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT: ORDER LIST */
.left{
width:35%;
background:#fff;
overflow:auto;
border-right:1px solid #ddd;
}

.order{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.order:hover{background:#fafafa;}

.order.active{
background:#f3e9cb;
}

/* RIGHT: RECEIPT */
.right{
flex:1;
display:flex;
flex-direction:column;
}

.receipt{
flex:1;
background:#fff;
margin:15px;
padding:15px;
border-radius:10px;
overflow:auto;
}

.item{
border-bottom:1px dashed #ddd;
margin-bottom:8px;
padding-bottom:6px;
}

.total{
font-size:22px;
font-weight:bold;
text-align:right;
margin-top:10px;
}

/* PAYMENT */
.payment{
padding:15px;
}

.payment input{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:10px;
}

.payment button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:var(--success);
color:white;
font-size:18px;
margin-bottom:10px;
}

/* ACTION */
.actions{
display:flex;
gap:10px;
padding:0 15px 15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.print{background:#231a1d;color:white;}
.paid{background:#2e7d32;color:white;}

/* PRINT */
@media print{
.left,.payment,.actions,.header{
display:none;
}

.receipt{
margin:0;
box-shadow:none;
}
}
</style>
</head>

<body>

<div class="header">💰 CASHIER</div>

<div class="container">

<!-- LEFT -->
<div class="left" id="orderList"></div>

<!-- RIGHT -->
<div class="right">

<div class="receipt" id="receiptBox">
เลือกออเดอร์
</div>

<div class="payment">
<input id="receive" placeholder="รับเงิน">
<button onclick="calcChange()">คำนวณเงินทอน</button>
<div id="change"></div>
</div>

<div class="actions">
<button class="print" onclick="window.print()">🖨 พิมพ์</button>
<button class="paid" onclick="markPaid()">✅ ชำระเงินแล้ว</button>
</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbylb0DcxAvjqdNk9SLrdUuf80svwCHJLQVMlozS_GA_5Tt6RAr20172Tcl_c1q7v7Zf/exec";

let rawData = [];
let orders = [];
let currentOrder = null;
let currentTotal = 0;

// ===== โหลดรายการ =====
async function loadOrders(){
let res = await fetch(API_URL);
rawData = await res.json();

let grouped = groupOrders(rawData);

// เอา order ที่จ่ายแล้วออก (client side)
let paidIds = JSON.parse(localStorage.getItem("paidOrders")||"[]");

orders = grouped.filter(o => !paidIds.includes(o.id));

renderOrderList();
}

// ===== group =====
function groupOrders(data){

let map = {};

data.forEach(row=>{

if(!map[row.id]){
map[row.id] = {id:row.id,time:row.time,items:[]};
}

map[row.id].items.push(JSON.parse(row.item));

});

return Object.values(map).reverse();
}

// ===== render left =====
function renderOrderList(){

let html = "";

orders.forEach((o,i)=>{

html += `
<div class="order" onclick="selectOrder(${i})">
<b>${o.id}</b><br>
<small>${o.time}</small>
</div>
`;

});

document.getElementById("orderList").innerHTML = html;
}

// ===== select =====
function selectOrder(i){

currentOrder = orders[i];

let html = `
<div><b>${currentOrder.id}</b></div>
<div>${currentOrder.time}</div><hr>
`;

let total = 0;

currentOrder.items.forEach(item=>{

let sum = item.price * item.qty;
total += sum;

html += `
<div class="item">
${item.menu} x${item.qty}<br>
${sum.toLocaleString()} บาท
</div>
`;

});

html += `<div class="total">รวม ${total.toLocaleString()} บาท</div>`;

currentTotal = total;

document.getElementById("receiptBox").innerHTML = html;
}

// ===== calc =====
function calcChange(){

let r = parseFloat(document.getElementById("receive").value)||0;
let c = r - currentTotal;

document.getElementById("change").innerText =
"เงินทอน: "+c.toLocaleString()+" บาท";

// แสดงบนบิลด้วย
document.getElementById("receiptBox").innerHTML +=
`<div class="total">รับ ${r} | ทอน ${c.toLocaleString()}</div>`;
}

// ===== mark paid =====
function markPaid(){

if(!currentOrder) return;

let paid = JSON.parse(localStorage.getItem("paidOrders")||"[]");

paid.push(currentOrder.id);

localStorage.setItem("paidOrders",JSON.stringify(paid));

// รีโหลด
loadOrders();

document.getElementById("receiptBox").innerHTML = "เลือกออเดอร์";
document.getElementById("change").innerText = "";
document.getElementById("receive").value = "";

currentOrder = null;
}

// auto refresh
loadOrders();
setInterval(loadOrders,5000);

</script>

</body>
</html>
