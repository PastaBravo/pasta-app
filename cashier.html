<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cashier</title>

<style>

/* THEME */
:root{
--primary:#b52627;
--cream:#f3e9cb;
--dark:#231a1d;
}

body{
font-family:-apple-system, BlinkMacSystemFont;
background:var(--cream);
margin:0;
color:var(--dark);
}

/* HEADER */
.header{
background:var(--primary);
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* RECEIPT */
.receipt{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
border-bottom:1px dashed #ddd;
padding-bottom:8px;
}

.item-name{
font-weight:bold;
}

.item-sub{
font-size:12px;
color:#777;
}

/* TOTAL */
.total{
text-align:right;
font-size:20px;
font-weight:bold;
margin-top:15px;
}

/* BUTTON */
.btn{
margin:15px;
padding:15px;
width:calc(100% - 30px);
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:16px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">🧾 ใบเสร็จ</div>

<div class="receipt" id="receiptList">
<!-- รายการ -->
</div>

<div class="total">
รวมทั้งหมด: <span id="grandTotal">0</span> บาท
</div>

<button class="btn" onclick="confirmOrder()">ยืนยันคำสั่งซื้อ</button>

<script>

// ===== LOAD CART =====
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let receiptHTML = "";
let total = 0;

cart.forEach((item, index)=>{

let itemTotal = item.price * item.qty;
total += itemTotal;

receiptHTML += `
<div class="item">
  <div>
    <div class="item-name">${item.menu} x${item.qty}</div>
    <div class="item-sub">
      ${item.pasta} • ${item.protein}<br>
      + ${item.topping}
    </div>
  </div>
  <div>${itemTotal}฿</div>
</div>
`;

});

document.getElementById("receiptList").innerHTML = receiptHTML;
document.getElementById("grandTotal").innerText = total;


// ===== CONFIRM ORDER =====
function confirmOrder(){

alert("ออเดอร์สำเร็จ!");

localStorage.removeItem("cart");

window.location.href = "index.html";
}

</script>

</body>
</html>
