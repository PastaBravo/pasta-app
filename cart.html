<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart</title>

<style>
:root{
--primary:#b52627;
--primary-dark:#8f1d1e;
--cream:#f3e9cb;
--dark:#231a1d;
--success:#2e7d32;
--success-dark:#256628;

--radius:12px;
--shadow:0 4px 12px rgba(0,0,0,0.08);
}

body{
font-family:-apple-system;
background:var(--cream);
margin:0;
color:var(--dark);
}

.header{
background:var(--primary);
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

.item{
background:white;
border-radius:var(--radius);
padding:14px;
margin-bottom:12px;
box-shadow:var(--shadow);
border:1px solid rgba(0,0,0,0.05);
}

.name{
font-weight:bold;
font-size:16px;
}

.detail{
font-size:13px;
color:#666;
margin-top:6px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.qty button{
padding:6px 12px;
border:none;
background:#eee;
border-radius:6px;
}

/* ปุ่มลบ */
.remove-btn{
background:#eee;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.total{
font-size:24px;
text-align:center;
margin:25px 0 15px;
font-weight:bold;
color:var(--primary);
}

/* ปุ่ม */
button{
cursor:pointer;
}

/* สั่งเพิ่ม */
.addMore{
margin:0 15px 10px;
padding:15px;
width:calc(100% - 30px);
border:none;
border-radius:10px;
background:var(--success);
color:white;
font-size:18px;
font-weight:bold;
transition:0.2s;
}

.addMore:hover{
background:var(--success-dark);
}

.addMore:active{
transform:scale(0.97);
}

/* ส่งออเดอร์ */
.checkout{
margin:0 15px 20px;
padding:15px;
width:calc(100% - 30px);
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-size:18px;
font-weight:bold;
transition:0.2s;
}

.checkout:hover{
background:var(--primary-dark);
}

.checkout:active{
transform:scale(0.97);
}
</style>
</head>

<body>

<div class="header">🛒 ตะกร้า</div>

<div class="container" id="cartList"></div>

<div class="total">
รวม: <span id="totalPrice">0</span> บาท
</div>

<button class="addMore" onclick="goMenu()">➕ สั่งเพิ่ม</button>
<button class="checkout" onclick="checkout()">ส่งออเดอร์</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbylb0DcxAvjqdNk9SLrdUuf80svwCHJLQVMlozS_GA_5Tt6RAr20172Tcl_c1q7v7Zf/exec";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

// ✅ กรณี cart ว่าง
if(cart.length === 0){
document.getElementById("cartList").innerHTML = `
<div style="text-align:center;padding:40px;color:#777">
ไม่มีสินค้าในตะกร้า 🛒
</div>
`;
document.getElementById("totalPrice").innerText = 0;
return;
}

let html = "";
let total = 0;

cart.forEach((item, index)=>{

total += item.price * item.qty;

html += `
<div class="item">
<div class="name">${item.menu}</div>
<div class="detail">
${item.pasta} | ${item.protein}<br>
${item.topping}
</div>

<div class="row">
<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
${item.qty}
<button onclick="changeQty(${index},1)">+</button>
</div>

<div>
${(item.price * item.qty).toLocaleString()} บาท
</div>

<button class="remove-btn" onclick="removeItem(${index})">❌</button>

</div>
</div>
`;

});

document.getElementById("cartList").innerHTML = html;
document.getElementById("totalPrice").innerText = total.toLocaleString();

}

renderCart();

function changeQty(i,delta){
cart[i].qty += delta;

if(cart[i].qty <= 0){
cart.splice(i,1);
}

saveCart();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
}

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

function goMenu(){
window.location.href = "index.html";
}

async function checkout(){

if(cart.length === 0){
alert("ไม่มีสินค้า");
return;
}

let order = {
time: new Date().toLocaleString(),
items: cart
};

try{

await fetch(API_URL,{
method:"POST",
body: JSON.stringify(order)
});

alert("ส่งออเดอร์เรียบร้อย");

localStorage.removeItem("cart");

window.location.href = "index.html";

}catch(err){
alert("ส่งไม่สำเร็จ");
console.error(err);
}

}

</script>

</body>
</html>
