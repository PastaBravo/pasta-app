<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart</title>

<style>
body{
font-family:-apple-system;
background:#f3e9cb;
margin:0;
}

.header{
background:#b52627;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.item{
background:white;
border-radius:12px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
border:1px solid #f3e9cb;
}

.name{
font-weight:bold;
font-size:16px;
color:#231a1d;
}

.detail{
font-size:13px;
color:#555;
margin-top:5px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.qty button{
padding:5px 10px;
border:none;
background:#ddd;
border-radius:6px;
}

.total{
font-size:22px;
text-align:center;
margin:20px;
font-weight:bold;
color:#b52627;
}

/* ปุ่มสั่งเพิ่ม */
.addMore{
margin:0 15px 10px;
padding:14px;
width:calc(100% - 30px);
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:18px;
font-weight:bold;
transition:0.2s;
}

.addMore:hover{
background:#256628;
}

/* ปุ่มส่งออเดอร์ */
.checkout{
margin:0 15px 15px;
padding:14px;
width:calc(100% - 30px);
border:none;
border-radius:10px;
background:#b52627;
color:white;
font-size:18px;
font-weight:bold;
transition:0.2s;
}

.checkout:hover{
background:#8f1d1e;
}
</style>
</head>

<body>

<div class="header">🛒 ตะกร้า</div>

<div class="container" id="cartList"></div>

<div class="total">
รวม: <span id="totalPrice">0</span> บาท
</div>

<!-- ✅ ปุ่มสั่งเพิ่ม (อยู่บน) -->
<button class="addMore" onclick="goMenu()">➕ สั่งเพิ่ม</button>

<!-- ✅ ปุ่มส่งออเดอร์ -->
<button class="checkout" onclick="checkout()">ส่งออเดอร์</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbylb0DcxAvjqdNk9SLrdUuf80svwCHJLQVMlozS_GA_5Tt6RAr20172Tcl_c1q7v7Zf/exec";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

let html = "";
let total = 0;

cart.forEach((item, index)=>{

total += item.price * item.qty;

html += `
<div class="item">
<div class="name">${item.menu}</div>
<div class="detail">
${item.pasta} | ${item.protein}<br>
${item.topping}
</div>

<div class="row">
<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
${item.qty}
<button onclick="changeQty(${index},1)">+</button>
</div>

<div>
${item.price * item.qty} บาท
</div>

<button onclick="removeItem(${index})">❌</button>

</div>
</div>
`;

});

document.getElementById("cartList").innerHTML = html;
document.getElementById("totalPrice").innerText = total;

}

renderCart();

function changeQty(i,delta){
cart[i].qty += delta;

if(cart[i].qty <= 0){
cart.splice(i,1);
}

saveCart();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
}

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

// ✅ ปุ่มสั่งเพิ่ม (ไม่ลบ cart)
function goMenu(){
window.location.href = "index.html";
}

async function checkout(){

if(cart.length === 0){
alert("ไม่มีสินค้า");
return;
}

let order = {
time: new Date().toLocaleString(),
items: cart
};

console.log("SEND:", order);

try{

await fetch(API_URL,{
method:"POST",
body: JSON.stringify(order)
});

alert("ส่งออเดอร์เรียบร้อย");

// ลบ cart เฉพาะตอนสั่งจริง
localStorage.removeItem("cart");

window.location.href = "index.html";

}catch(err){
alert("ส่งไม่สำเร็จ");
console.error(err);
}

}

</script>

</body>
</html>
