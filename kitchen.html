<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kitchen PRO</title>

<style>
body{
font-family:-apple-system;
background:#111;
color:white;
margin:0;
}

.header{
background:#c0392b;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#222;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.queue{
font-size:26px;
font-weight:bold;
color:#f1c40f;
}

.new{border-left:6px solid #f1c40f;}
.cooking{border-left:6px solid #3498db;}
.ready{border-left:6px solid #2ecc71;}
.done{opacity:0.4;}

button{
margin:5px 5px 0 0;
padding:6px 10px;
border:none;
border-radius:6px;
font-size:14px;
}

.cook{background:#3498db;color:white;}
.readyBtn{background:#27ae60;color:white;}
.doneBtn{background:#555;color:white;}
</style>

</head>

<body>

<div class="header">🔥 Kitchen PRO</div>

<div class="container" id="list"></div>

<audio id="ding" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbylb0DcxAvjqdNk9SLrdUuf80svwCHJLQVMlozS_GA_5Tt6RAr20172Tcl_c1q7v7Zf/exec";

let lastCount = 0;

async function loadOrders(){

let res = await fetch(API_URL);
let data = await res.json();

// 🔔 เสียงแจ้งเตือน
if(data.length > lastCount){
document.getElementById("ding").play();
}
lastCount = data.length;

let html = "";

data.reverse().forEach(order => {

let cls = order.status.toLowerCase();

html += `
<div class="card ${cls}">
<div class="queue">#${order.queue}</div>

<div><b>${order.menu}</b> x${order.qty}</div>
<div>${order.pasta} | ${order.protein}</div>
<div>${order.topping}</div>
<div>${order.time}</div>

<div>
${order.status === "NEW" ? `<button class="cook" onclick="update(${order.row},'COOKING')">เริ่มทำ</button>` : ""}

${order.status === "COOKING" ? `<button class="readyBtn" onclick="update(${order.row},'READY')">เสร็จแล้ว</button>` : ""}

${order.status === "READY" ? `<button class="doneBtn" onclick="update(${order.row},'DONE')">รับแล้ว</button>` : ""}
</div>

</div>
`;

});

document.getElementById("list").innerHTML = html;

}

// update status
async function update(row,status){

await fetch(API_URL,{
method:"POST",
body: JSON.stringify({
action:"update",
row: row,
status: status
})
});

loadOrders();
}

// auto refresh
setInterval(loadOrders, 3000);

loadOrders();

</script>

</body>
</html>
