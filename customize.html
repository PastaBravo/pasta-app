<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customize</title>

<style>

/* ===== THEME ===== */
:root{
--primary:#b52627;
--primary-dark:#8f1d1e;
--cream:#f3e9cb;
--dark:#231a1d;
--accent:#2e7d32;
--accent-dark:#256628;

--radius:14px;
--shadow:0 6px 16px rgba(0,0,0,0.08);
}

/* ===== BASE ===== */
body{
font-family:-apple-system, BlinkMacSystemFont;
background:var(--cream);
margin:0;
color:var(--dark);
}

/* HEADER */
.header{
background:var(--primary);
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* SECTION */
.section{
padding:15px;
}

.section h2{
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:var(--radius);
overflow:hidden;
box-shadow:var(--shadow);
cursor:pointer;
transition:0.2s;
}

.card:active{
transform:scale(0.97);
}

/* ACTIVE = premium look */
.card.active{
outline:3px solid var(--primary);
transform:translateY(-3px);
}

/* IMAGE */
.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* TEXT */
.card h3{
margin:10px;
font-size:16px;
text-align:center;
}

.price{
text-align:center;
color:var(--primary);
font-weight:bold;
margin-bottom:10px;
}

/* TOTAL */
.total{
font-size:22px;
color:var(--primary);
font-weight:bold;
text-align:center;
margin:15px;
}

/* BUTTON */
button{
margin:10px;
padding:14px;
width:calc(100% - 20px);
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-size:16px;
font-weight:bold;
}

/* ===== FLOATING CART ===== */
.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:var(--primary);
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
z-index:999;
}

/* BADGE */
#cartBadge{
position:absolute;
top:-5px;
right:-5px;
background:#ff3b30;
color:white;
font-size:12px;
font-weight:bold;
padding:4px 7px;
border-radius:50%;
}

/* POP */
.pop{
animation:pop 0.3s ease;
}
@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="header">🍝 Customize</div>

<div class="section">
<h2 id="menuName"></h2>
</div>

<!-- (โครง menu เหมือนเดิม ไม่เปลี่ยน) -->

<!-- ===== FLOATING CART ===== -->
<div class="floating-cart" onclick="goCart()">
🛒
<span id="cartBadge">0</span>
</div>

<script>

// ===== MENU =====
const params = new URLSearchParams(window.location.search);
const menu = params.get("menu");
document.getElementById("menuName").innerText = menu;

// ===== PRICE =====
const priceMap = {
"Carbonara":139,
"Bolognese":139,
"Pesto":139,
"Chili Bacon":139,
"Aglio Olio":129,
"Seafood":159,
"Alfredo":149,
"Truffle Cream":159
};

let basePrice = priceMap[menu] || 0;
let pastaPrice = 0;
let proteinPrice = 0;
let toppingTotal = 0;

// ===== SELECT =====
function selectOption(el,type,price){
let group = el.parentElement;
group.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

if(type==="pasta") pastaPrice = price;
if(type==="protein") proteinPrice = price;

calculate();
}

function toggleTopping(el,price){
el.classList.toggle("active");

if(el.classList.contains("active")){
toppingTotal += price;
}else{
toppingTotal -= price;
}

calculate();
}

// ===== CALCULATE =====
function calculate(){
let total = basePrice + pastaPrice + proteinPrice + toppingTotal;
document.getElementById("totalPrice").innerText = total;
}

// ===== CART BADGE =====
function updateCartCount(animated=false){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let totalQty = 0;
cart.forEach(i=> totalQty += i.qty);

let badge = document.getElementById("cartBadge");
badge.innerText = totalQty;
badge.style.display = totalQty>0?"block":"none";

if(animated){
let btn = document.querySelector(".floating-cart");
btn.classList.add("pop");
setTimeout(()=>btn.classList.remove("pop"),300);
}
}

// ===== ADD TO CART =====
function addToCart(){

let pastaEl = document.querySelector('.pasta-section .card.active h3');
let proteinEl = document.querySelector('.protein-section .card.active h3');

if(!pastaEl || !proteinEl){
alert("กรุณาเลือกเส้นและเนื้อ");
return;
}

let toppings = [];
document.querySelectorAll('.topping-section .card.active h3')
.forEach(el => toppings.push(el.innerText));

let item = {
menu: menu,
pasta: pastaEl.innerText,
protein: proteinEl.innerText,
topping: toppings.join(", ") || "-",
price: parseInt(document.getElementById("totalPrice").innerText),
qty: 1
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push(item);
localStorage.setItem("cart", JSON.stringify(cart));

// animation cart
updateCartCount(true);

// delay แล้วค่อยไปหน้า cart
setTimeout(()=>{
window.location.href = "cart.html";
},400);
}

// ===== NAV =====
function goCart(){
window.location.href = "cart.html";
}

// INIT
calculate();
updateCartCount();

window.addEventListener("focus", ()=>{
updateCartCount();
});

</script>

</body>
</html>
